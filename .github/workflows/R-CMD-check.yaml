on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache-version: 1

      - name: Prepare diagnostic progress log
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/couplr-diag"
          : > "${RUNNER_TEMP}/couplr-diag/test_progress.log"
          echo "COUPLR_TEST_PROGRESS_LOG=${RUNNER_TEMP}/couplr-diag/test_progress.log" >> "$GITHUB_ENV"

      - uses: r-lib/actions/check-r-package@v2
        timeout-minutes: 25
        with:
          upload-snapshots: true
          upload-results: true

      - name: Dump test progress log (rescue on timeout/failure)
        if: always()
        shell: bash
        run: |
          echo "::group::test progress log (tail 300)"
          if [ -s "${COUPLR_TEST_PROGRESS_LOG}" ]; then
            tail -300 "${COUPLR_TEST_PROGRESS_LOG}"
          else
            echo "(progress log empty or missing)"
          fi
          echo "::endgroup::"
          echo "::group::testthat.Rout (tail 300)"
          find check -name 'testthat.Rout*' -print -exec tail -300 '{}' \; 2>/dev/null || echo "(no testthat.Rout)"
          echo "::endgroup::"
